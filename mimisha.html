<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>模写アシスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
  --border:#333;--text:#e8e8e8;--muted:#888;
  --accent:#7c9fff;--accent2:#5fffb0;
  --radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
/* STEPPER */
.stepper{display:flex;align-items:center;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.stepper-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:.4;transition:opacity .2s}
.stepper-item.done,.stepper-item.current{opacity:1}
.stepper-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--muted);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .2s}
.stepper-item.done .stepper-dot{background:var(--accent2);border-color:var(--accent2);color:#000}
.stepper-item.current .stepper-dot{border-color:var(--accent);color:var(--accent)}
.stepper-label{font-size:10px;color:var(--muted);text-align:center}
.stepper-item.current .stepper-label{color:var(--text)}
.stepper-line{width:20px;height:2px;background:var(--border);flex-shrink:0;margin-bottom:18px}

/* STEPS */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.step{display:none;flex-direction:column;flex:1;padding:16px;gap:14px;overflow-y:auto}
.step.active{display:flex}
.step-title{font-size:13px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.step-desc{font-size:15px;line-height:1.6}

/* CAMERA */
.cam-wrap{position:relative;width:100%;aspect-ratio:3/4;background:#000;border-radius:var(--radius);overflow:hidden;flex-shrink:0}
.cam-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.overlay-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cam-controls{position:absolute;bottom:16px;left:0;right:0;display:flex;justify-content:center;align-items:center;padding:0 20px}
.cam-controls-spacer{flex:1}
.cam-select-wrap{flex:1;display:flex;justify-content:flex-end;align-items:center}
select.cam-select{background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:6px 8px;font-size:12px;max-width:110px;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center}
.shutter{width:64px;height:64px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.4);cursor:pointer;transition:transform .1s}
.shutter:active{transform:scale(.92)}
.float-ctrl{position:absolute;top:12px;left:12px;right:12px;display:flex;align-items:center;gap:8px}
.float-ctrl label{font-size:12px;color:#fff;text-shadow:0 1px 3px #000;white-space:nowrap}
input[type=range]{flex:1;accent-color:var(--accent)}
.float-val{font-size:12px;color:#fff;text-shadow:0 1px 3px #000;min-width:34px;text-align:right}

/* OVERLAY TOGGLE */
.ov-toggle{position:absolute;top:46px;right:12px;display:flex;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.3)}
.ov-toggle button{padding:4px 10px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:rgba(0,0,0,.45);color:rgba(255,255,255,.7);transition:all .15s}
.ov-toggle button.active{background:var(--accent);color:#000}

.adjust-wrap{position:relative;width:100%;aspect-ratio:3/4;background:#111;border-radius:var(--radius);overflow:hidden;flex-shrink:0;touch-action:none}
#target-layer{position:absolute;inset:0;width:100%;height:100%}
#mine-layer{position:absolute;inset:0;width:100%;height:100%;touch-action:none}

/* COMPARE (step4) */
.compare-wrap{position:relative;width:100%;aspect-ratio:3/4;background:#000;border-radius:var(--radius);overflow:hidden;flex-shrink:0}
#compare-canvas{width:100%;height:100%}

/* BUTTONS */
.btn{padding:12px 20px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:active{opacity:.75}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}
.divider{height:1px;background:var(--border);flex-shrink:0}

/* CTRL ROW */
.ctrl-row{display:flex;align-items:center;gap:10px}
.ctrl-label{font-size:13px;color:var(--muted);min-width:60px;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border);padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="stepper">
  <div class="stepper-item current" id="st1" onclick="goStep(1)">
    <div class="stepper-dot">1</div>
    <div class="stepper-label">目標撮影</div>
  </div>
  <div class="stepper-line"></div>
  <div class="stepper-item" id="st2" onclick="goStep(2)">
    <div class="stepper-dot">2</div>
    <div class="stepper-label">自分の絵</div>
  </div>
  <div class="stepper-line"></div>
  <div class="stepper-item" id="st3" onclick="goStep(3)">
    <div class="stepper-dot">3</div>
    <div class="stepper-label">位置合わせ</div>
  </div>
  <div class="stepper-line"></div>
  <div class="stepper-item" id="st4" onclick="goStep(4)">
    <div class="stepper-dot">4</div>
    <div class="stepper-label">比較</div>
  </div>
</div>

<div class="main">

<!-- STEP 1: 目標絵撮影 -->
<div class="step active" id="step1">
  <div class="step-title">手順 1</div>
  <div class="step-desc">目標となる絵を撮影します</div>
  <div class="cam-wrap">
    <video id="video1" autoplay playsinline muted></video>
    <canvas class="overlay-canvas" id="grid-canvas1"></canvas>
    <div class="cam-controls">
      <div class="cam-controls-spacer"></div>
      <button class="shutter" onclick="capture(1)"></button>
      <div class="cam-select-wrap">
        <select class="cam-select" id="cam-select1" onchange="switchCamera(1,this.value)">
          <option value="">カメラ選択</option>
        </select>
      </div>
    </div>
  </div>
  <label class="btn btn-secondary" style="cursor:pointer">
    📁 ファイルから選択
    <input type="file" accept="image/*" style="display:none" onchange="loadFile(1,this)">
  </label>
  <canvas id="snap1" style="display:none"></canvas>
</div>

<!-- STEP 2: 自分の絵撮影 -->
<div class="step" id="step2">
  <div class="step-title">手順 2</div>
  <div class="step-desc">目標絵を透かしながら自分の絵を撮影します</div>
  <div class="cam-wrap">
    <video id="video2" autoplay playsinline muted></video>
    <canvas class="overlay-canvas" id="overlay-canvas"></canvas>
    <div class="float-ctrl">
      <label>透明度</label>
      <input type="range" id="ov-opacity" min="0" max="100" value="35" oninput="ovOpacity=this.value/100;document.getElementById('ov-val').textContent=this.value+'%'">
      <span class="float-val" id="ov-val">35%</span>
    </div>
    <div class="ov-toggle">
      <button id="btn-ov-img" class="active" onclick="setOvMode('image')">画像</button>
      <button id="btn-ov-edge" onclick="setOvMode('edge')">エッジ</button>
    </div>
    <div class="cam-controls">
      <div class="cam-controls-spacer"></div>
      <button class="shutter" onclick="capture(2)"></button>
      <div class="cam-select-wrap">
        <select class="cam-select" id="cam-select2" onchange="switchCamera(2,this.value)">
          <option value="">カメラ選択</option>
        </select>
      </div>
    </div>
  </div>
  <label class="btn btn-secondary" style="cursor:pointer">
    📁 ファイルから選択
    <input type="file" accept="image/*" style="display:none" onchange="loadFile(2,this)">
  </label>
  <canvas id="snap2" style="display:none"></canvas>
</div>

<!-- STEP 3: 手動位置合わせ -->
<div class="step" id="step3">
  <div class="step-title">手順 3</div>
  <div class="step-desc">自分の絵をドラッグ・ピンチで目標に合わせてください</div>
  <div class="adjust-wrap" id="adjust-wrap">
    <canvas id="target-layer"></canvas>
    <canvas id="mine-layer"></canvas>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">自分の絵の透明度</span>
    <input type="range" id="mine-opacity" min="10" max="100" value="60" oninput="mineOpacity=this.value/100;renderMine()">
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="resetTransform()">リセット</button>
    <button class="btn btn-primary" onclick="goStep(4)">比較アニメ開始 →</button>
  </div>
</div>

<!-- STEP 4: 比較アニメ -->
<div class="step" id="step4">
  <div class="step-title">手順 4</div>
  <div class="step-desc">2枚を交互に表示して差異を確認します</div>
  <div class="compare-wrap">
    <canvas id="compare-canvas"></canvas>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">切替速度</span>
    <input type="range" id="speed-slider" min="200" max="2000" value="700" step="100"
      oninput="animSpeed=+this.value;document.getElementById('speed-val').textContent=(this.value/1000).toFixed(1)+'s';restartAnim()">
    <span id="speed-val" style="font-size:13px;color:var(--muted);min-width:36px">0.7s</span>
  </div>
  <div class="divider"></div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="goStep(3)">← 位置修正</button>
    <button class="btn btn-secondary" onclick="goStep(2)">再撮影</button>
  </div>
</div>

</div><!-- /main -->

<div class="toast" id="toast"></div>

<script>
// ===============================================================
// STATE
// ===============================================================
let targetCanvas = null;  // HTMLCanvasElement
let mineCanvas   = null;

let ovOpacity  = 0.35;
let mineOpacity = 0.60;
let animSpeed  = 700;
let animTimer  = null;
let animFrame  = 0;
let currentStep = 1;

const streams = {};

// Transform of mine layer
// tx, ty are in NORMALIZED coords (0-1 relative to adjust-wrap size at the time of edit)
// We store the adjust-wrap size at reset time so compare can reconstruct correctly
let T = { tx:0, ty:0, scale:1, angle:0 };
let T_baseW = 1, T_baseH = 1; // adjust-wrap size when T was last set

// ===============================================================
// STEP NAVIGATION
// ===============================================================
function goStep(n){
  if(n >= 2 && !targetCanvas){ showToast('先に目標絵を撮影してください'); return; }
  if(n >= 3 && !mineCanvas)  { showToast('先に自分の絵を撮影してください'); return; }

  currentStep = n;
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');

  for(let i=1;i<=4;i++){
    const el = document.getElementById('st'+i);
    el.classList.remove('done','current');
    if(i < n) el.classList.add('done');
    if(i === n) el.classList.add('current');
  }

  // Camera management
  [1,2].forEach(id => { if(id !== n) stopCamera(id); });
  if(n === 1) startCamera(1);
  if(n === 2){
    startCamera(2);
    startOverlay();
    // step1と同じカメラリストをstep2のセレクターにも反映
    populateCamSelect(2).then(()=>{
      const s1 = document.getElementById('cam-select1');
      const s2 = document.getElementById('cam-select2');
      if(s1 && s2) s2.value = s1.value;
    });
  }
  if(n === 1) startGrid1();
  if(n === 3){ stopCamera(2); initAdjust(); }
  if(n === 4){ startAnim(); }
}

// ===============================================================
// CAMERA
// ===============================================================
async function startCamera(id){
  if(streams[id]) return;
  const video = document.getElementById('video'+id);
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment' },
      audio: false
    });
    streams[id] = stream;
    video.srcObject = stream;
    await video.play();
    await populateCamSelect(id);
    // セレクターを現在使用中のデバイスに合わせる
    const track = stream.getVideoTracks()[0];
    const deviceId = track.getSettings().deviceId;
    const sel = document.getElementById('cam-select'+id);
    if(sel && deviceId) sel.value = deviceId;
  } catch(e){
    showToast('カメラを起動できませんでした');
    console.error(e);
  }
}

async function populateCamSelect(id){
  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const sel  = document.getElementById('cam-select'+id);
    if(!sel) return;
    sel.innerHTML = '';
    cams.forEach((cam, i) => {
      const opt = document.createElement('option');
      opt.value = cam.deviceId;
      opt.textContent = cam.label || `カメラ ${i+1}`;
      sel.appendChild(opt);
    });
  } catch(e){ console.warn(e); }
}

async function switchCamera(id, deviceId){
  if(!deviceId) return;
  // 現在のストリームを停止
  if(streams[id]){ streams[id].getTracks().forEach(t=>t.stop()); delete streams[id]; }
  const video = document.getElementById('video'+id);
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ deviceId:{ exact: deviceId } },
      audio: false
    });
    streams[id] = stream;
    video.srcObject = stream;
    await video.play();
  } catch(e){
    showToast('カメラの切り替えに失敗しました');
    console.error(e);
  }
}

function stopCamera(id){
  if(streams[id]){ streams[id].getTracks().forEach(t=>t.stop()); delete streams[id]; }
  const v = document.getElementById('video'+id);
  if(v) v.srcObject = null;
}

// ===============================================================
// CAPTURE / FILE LOAD
// ===============================================================
function capture(id){
  const video = document.getElementById('video'+id);
  if(!video.videoWidth){ showToast('カメラが起動していません'); return; }
  const c = document.getElementById('snap'+id);
  c.width  = video.videoWidth;
  c.height = video.videoHeight;
  c.getContext('2d').drawImage(video, 0, 0);
  onImageReady(id, c);
}

function loadFile(id, input){
  const file = input.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = () => {
    const c = document.getElementById('snap'+id);
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    URL.revokeObjectURL(img.src);
    onImageReady(id, c);
  };
  img.src = URL.createObjectURL(file);
}

function onImageReady(id, canvas){
  if(id === 1){
    targetCanvas = canvas;
    showToast('目標絵を取得しました ✓');
    setTimeout(() => goStep(2), 500);
  } else {
    mineCanvas = canvas;
    showToast('自分の絵を取得しました ✓');
    setTimeout(() => goStep(3), 500);
  }
}

// ===============================================================
// GRID DRAWING
// ===============================================================
function drawGrid(ctx, W, H){
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  for(let i=1; i<=2; i++){
    ctx.beginPath(); ctx.moveTo(W*i/3, 0); ctx.lineTo(W*i/3, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, H*i/3); ctx.lineTo(W, H*i/3); ctx.stroke();
  }
  ctx.restore();
}

// ===============================================================
// STEP1: GRID LOOP
// ===============================================================
let gridRaf1 = null;
function startGrid1(){
  const video = document.getElementById('video1');
  const gc    = document.getElementById('grid-canvas1');
  const ctx   = gc.getContext('2d');
  function draw(){
    if(currentStep !== 1){ gridRaf1 = null; return; }
    gc.width  = video.offsetWidth  || gc.offsetWidth;
    gc.height = video.offsetHeight || gc.offsetHeight;
    ctx.clearRect(0, 0, gc.width, gc.height);
    drawGrid(ctx, gc.width, gc.height);
    gridRaf1 = requestAnimationFrame(draw);
  }
  if(gridRaf1) cancelAnimationFrame(gridRaf1);
  gridRaf1 = requestAnimationFrame(draw);
}

// ===============================================================
// STEP2: OVERLAY LOOP (target image or edge + grid)
// ===============================================================
let ovRaf  = null;
let ovMode = 'image'; // 'image' | 'edge'
let edgeCache = null; // canvasElement, built on demand

function setOvMode(mode){
  ovMode = mode;
  document.getElementById('btn-ov-img').classList.toggle('active',  mode==='image');
  document.getElementById('btn-ov-edge').classList.toggle('active', mode==='edge');
  if(mode === 'edge' && !edgeCache) edgeCache = buildEdgeCanvas();
}

// Build a canvas containing the Sobel edge image of targetCanvas
function buildEdgeCanvas(){
  const src = targetCanvas;
  const W = src.width, H = src.height;
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tctx = tmp.getContext('2d');
  tctx.filter = 'grayscale(1)';
  tctx.drawImage(src, 0, 0);
  tctx.filter = 'none';

  const px = tctx.getImageData(0, 0, W, H).data;
  const gray = new Float32Array(W * H);
  for(let i = 0; i < W*H; i++) gray[i] = px[i*4] / 255;

  // Gaussian blur 3×3
  const blur = new Float32Array(W * H);
  for(let y = 1; y < H-1; y++){
    for(let x = 1; x < W-1; x++){
      blur[y*W+x] = (
        gray[(y-1)*W+(x-1)] + gray[(y-1)*W+x]*2 + gray[(y-1)*W+(x+1)] +
        gray[y*W+(x-1)]*2   + gray[y*W+x]*4      + gray[y*W+(x+1)]*2  +
        gray[(y+1)*W+(x-1)] + gray[(y+1)*W+x]*2  + gray[(y+1)*W+(x+1)]
      ) / 16;
    }
  }

  // Sobel
  const out = tctx.createImageData(W, H);
  let maxV = 0;
  const mag = new Float32Array(W * H);
  for(let y = 1; y < H-1; y++){
    for(let x = 1; x < W-1; x++){
      const gx = -blur[(y-1)*W+(x-1)] + blur[(y-1)*W+(x+1)]
                 -2*blur[y*W+(x-1)]   + 2*blur[y*W+(x+1)]
                 -blur[(y+1)*W+(x-1)] + blur[(y+1)*W+(x+1)];
      const gy = -blur[(y-1)*W+(x-1)] - 2*blur[(y-1)*W+x] - blur[(y-1)*W+(x+1)]
                 +blur[(y+1)*W+(x-1)] + 2*blur[(y+1)*W+x] + blur[(y+1)*W+(x+1)];
      mag[y*W+x] = Math.sqrt(gx*gx + gy*gy);
      if(mag[y*W+x] > maxV) maxV = mag[y*W+x];
    }
  }
  for(let i = 0; i < W*H; i++){
    const v = maxV > 0 ? Math.round(mag[i] / maxV * 255) : 0;
    // White edges on black background
    out.data[i*4]   = 255;
    out.data[i*4+1] = 0;
    out.data[i*4+2] = 0;
    out.data[i*4+3] = v;
  }
  tctx.putImageData(out, 0, 0);
  return tmp;
}

function startOverlay(){
  if(!targetCanvas) return;
  edgeCache = null; // reset cache when target changes
  ovMode = 'image';
  document.getElementById('btn-ov-img').classList.add('active');
  document.getElementById('btn-ov-edge').classList.remove('active');

  const video = document.getElementById('video2');
  const oc    = document.getElementById('overlay-canvas');
  const ctx   = oc.getContext('2d');

  function draw(){
    if(currentStep !== 2){ ovRaf = null; return; }
    oc.width  = video.offsetWidth  || oc.offsetWidth;
    oc.height = video.offsetHeight || oc.offsetHeight;
    ctx.clearRect(0, 0, oc.width, oc.height);
    const src = (ovMode === 'edge' && edgeCache) ? edgeCache : targetCanvas;
    ctx.globalAlpha = ovOpacity;
    drawFit(ctx, src, oc.width, oc.height);
    ctx.globalAlpha = 1;
    drawGrid(ctx, oc.width, oc.height);
    ovRaf = requestAnimationFrame(draw);
  }
  if(ovRaf) cancelAnimationFrame(ovRaf);
  ovRaf = requestAnimationFrame(draw);
}

// ===============================================================
// STEP3: MANUAL ADJUST (pinch / drag / rotate)
// ===============================================================
function initAdjust(){
  // Render target as background
  const wrap   = document.getElementById('adjust-wrap');
  const tLayer = document.getElementById('target-layer');
  const mLayer = document.getElementById('mine-layer');

  const W = wrap.offsetWidth;
  const H = wrap.offsetHeight;
  tLayer.width = mLayer.width  = W;
  tLayer.height = mLayer.height = H;

  // Draw target (fixed, full opacity)
  const tCtx = tLayer.getContext('2d');
  drawFit(tCtx, targetCanvas, W, H);

  // Reset transform to fit mine into the canvas initially
  resetTransform();

  // Touch event listeners
  mLayer.addEventListener('touchstart',  onTouchStart,  {passive:false});
  mLayer.addEventListener('touchmove',   onTouchMove,   {passive:false});
  mLayer.addEventListener('touchend',    onTouchEnd,    {passive:false});
  mLayer.addEventListener('touchcancel', onTouchEnd,    {passive:false});
  // Mouse fallback
  mLayer.addEventListener('mousedown',   onMouseDown);
}

function resetTransform(){
  const wrap = document.getElementById('adjust-wrap');
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  T_baseW = W; T_baseH = H;
  // Fit mine centered — store as pixel coords within current wrap size
  const s = Math.min(W / mineCanvas.width, H / mineCanvas.height);
  T = {
    tx: (W - mineCanvas.width  * s) / 2,
    ty: (H - mineCanvas.height * s) / 2,
    scale: s,
    angle: 0
  };
  renderMine();
}

function renderMine(){
  const mLayer = document.getElementById('mine-layer');
  const W = mLayer.width, H = mLayer.height;
  const ctx = mLayer.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  ctx.globalAlpha = mineOpacity;
  ctx.save();
  // Apply transform: translate to tx,ty then rotate around image center
  const imgCx = T.tx + mineCanvas.width  * T.scale / 2;
  const imgCy = T.ty + mineCanvas.height * T.scale / 2;
  ctx.translate(imgCx, imgCy);
  ctx.rotate(T.angle);
  ctx.translate(-imgCx, -imgCy);
  ctx.drawImage(mineCanvas, T.tx, T.ty, mineCanvas.width * T.scale, mineCanvas.height * T.scale);
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ---- Touch gesture state ----
let touches = {};   // id -> {x,y}
let gesture = null; // null | {type, startT, startDist, startAngle}

function getTouchPos(touch, el){
  const r = el.getBoundingClientRect();
  return { x: touch.clientX - r.left, y: touch.clientY - r.top };
}

function onTouchStart(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    touches[t.identifier] = getTouchPos(t, e.currentTarget);
  }
  const ids = Object.keys(touches);
  if(ids.length === 1){
    gesture = { type:'drag', startT: {...T},
      startX: touches[ids[0]].x, startY: touches[ids[0]].y };
  } else if(ids.length === 2){
    const a = touches[ids[0]], b = touches[ids[1]];
    gesture = { type:'pinch', startT: {...T},
      startDist:  dist(a,b),
      startAngle: angle(a,b),
      midX: (a.x+b.x)/2, midY: (a.y+b.y)/2 };
  }
}

function onTouchMove(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    touches[t.identifier] = getTouchPos(t, e.currentTarget);
  }
  if(!gesture) return;
  const ids = Object.keys(touches);

  if(gesture.type === 'drag' && ids.length === 1){
    const cur = touches[ids[0]];
    T.tx = gesture.startT.tx + (cur.x - gesture.startX);
    T.ty = gesture.startT.ty + (cur.y - gesture.startY);
    renderMine();
  } else if(gesture.type === 'pinch' && ids.length === 2){
    const a = touches[ids[0]], b = touches[ids[1]];
    const curDist  = dist(a,b);
    const curAngle = angle(a,b);
    const scaleDelta = curDist / gesture.startDist;
    const angleDelta = curAngle - gesture.startAngle;

    // Scale and rotate around pinch midpoint
    const mx = gesture.midX, my = gesture.midY;
    const st = gesture.startT;

    // New scale
    const newScale = st.scale * scaleDelta;

    // Rotate tx,ty around midpoint
    const cos = Math.cos(angleDelta), sin = Math.sin(angleDelta);
    const ox = st.tx - mx, oy = st.ty - my;
    const rotX = ox*cos - oy*sin + mx;
    const rotY = ox*sin + oy*cos + my;

    // Scale tx,ty from midpoint
    T.scale = newScale;
    T.angle = st.angle + angleDelta;
    T.tx = (rotX - mx) * scaleDelta + mx;
    T.ty = (rotY - my) * scaleDelta + my;
    renderMine();
  }
}

function onTouchEnd(e){
  for(const t of e.changedTouches) delete touches[t.identifier];
  if(Object.keys(touches).length === 0) gesture = null;
}

// ---- Mouse fallback (single finger drag) ----
let mouse = null;
function onMouseDown(e){
  mouse = { startT: {...T}, startX: e.offsetX, startY: e.offsetY };
  const up = () => { mouse = null; window.removeEventListener('mouseup', up); window.removeEventListener('mousemove', mv); };
  const mv = (ev) => {
    if(!mouse) return;
    const mLayer = document.getElementById('mine-layer');
    const r = mLayer.getBoundingClientRect();
    T.tx = mouse.startT.tx + (ev.clientX - r.left) - mouse.startX;
    T.ty = mouse.startT.ty + (ev.clientY - r.top)  - mouse.startY;
    renderMine();
  };
  window.addEventListener('mousemove', mv);
  window.addEventListener('mouseup',   up);
}

function dist(a,b){ return Math.hypot(b.x-a.x, b.y-a.y); }
function angle(a,b){ return Math.atan2(b.y-a.y, b.x-a.x); }

// ===============================================================
// STEP4: COMPARE ANIMATION
// ===============================================================
function startAnim(){
  animFrame = 0;
  restartAnim();
}

function restartAnim(){
  if(animTimer) clearInterval(animTimer);
  drawAnimFrame();
  animTimer = setInterval(() => {
    animFrame ^= 1;
    drawAnimFrame();
  }, animSpeed);
}

function drawAnimFrame(){
  const canvas = document.getElementById('compare-canvas');
  const wrap   = canvas.parentElement;
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if(animFrame === 0){
    // --- 目標絵 ---
    drawFit(ctx, targetCanvas, W, H);
    drawLabel(ctx, '目標', 'rgba(124,159,255,0.95)');
  } else {
    // --- 自分の絵（位置合わせ済みtransformを再現）---
    // T is in adjust-wrap pixel coords (size T_baseW x T_baseH)
    // Scale to compare-canvas coords
    const sx = W / T_baseW, sy = H / T_baseH;

    const imgCx = (T.tx + mineCanvas.width  * T.scale / 2) * sx;
    const imgCy = (T.ty + mineCanvas.height * T.scale / 2) * sy;

    ctx.save();
    ctx.translate(imgCx, imgCy);
    ctx.rotate(T.angle);
    ctx.translate(-imgCx, -imgCy);
    ctx.drawImage(mineCanvas,
      T.tx * sx, T.ty * sy,
      mineCanvas.width  * T.scale * sx,
      mineCanvas.height * T.scale * sy);
    ctx.restore();
    drawLabel(ctx, '自分の絵', 'rgba(95,255,176,0.95)');
  }
}

// ===============================================================
// HELPERS
// ===============================================================
function drawFit(ctx, src, cw, ch){
  const s  = Math.min(cw / src.width, ch / src.height);
  const dw = src.width * s, dh = src.height * s;
  ctx.drawImage(src, (cw-dw)/2, (ch-dh)/2, dw, dh);
}

function drawLabel(ctx, text, color){
  ctx.font = 'bold 13px -apple-system,sans-serif';
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(6, 6, tw+16, 28);
  ctx.fillStyle = color;
  ctx.fillText(text, 14, 25);
}

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ===============================================================
// INIT
// ===============================================================
window.addEventListener('DOMContentLoaded', () => {
  startCamera(1);
  startGrid1();
});
window.addEventListener('beforeunload', () => {
  [1,2].forEach(id => stopCamera(id));
});
